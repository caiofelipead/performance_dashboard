<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="64" height="77">
  <defs>
    <clipPath id="shield">
      <path d="M4,4 L4,40 Q4,44 6,46 L6,46 L100,236 L194,46 Q196,44 196,40 L196,4 Q196,2 194,2 L100,2 L6,2 Q4,2 4,4 Z"/>
    </clipPath>
  </defs>
  <!-- Shield outline -->
  <path d="M4,6 Q4,2 8,2 L192,2 Q196,2 196,6 L196,38 Q196,42 194,46 L100,236 L6,46 Q4,42 4,38 Z" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Shield inner white background -->
  <path d="M12,10 L188,10 L188,36 Q188,40 186,44 L100,226 L14,44 Q12,40 12,36 Z" fill="#ffffff"/>
  <!-- Top decorative curve -->
  <path d="M12,10 Q60,30 100,10 Q140,30 188,10" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Black stripe left -->
  <rect x="12" y="60" width="36" height="160" fill="#1a1a1a" clip-path="url(#shield)"/>
  <!-- Red stripe center-left -->
  <rect x="82" y="60" width="16" height="160" fill="#DC2626" clip-path="url(#shield)"/>
  <!-- Red stripe center-right -->
  <rect x="102" y="60" width="16" height="160" fill="#DC2626" clip-path="url(#shield)"/>
  <!-- Black stripe right -->
  <rect x="152" y="60" width="36" height="160" fill="#1a1a1a" clip-path="url(#shield)"/>
  <!-- White stripes are the background showing through -->
  <!-- B.F.C. text -->
  <text x="100" y="50" text-anchor="middle" font-family="serif" font-weight="900" font-size="38" fill="#1a1a1a" letter-spacing="2">B.F.C.</text>
</svg>
