<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560">
  <defs>
    <clipPath id="shield-clip">
      <path d="M50 20 L192 20 Q218 60 250 60 Q282 60 308 20 L450 20 Q462 20 462 32 L462 310 Q462 440 250 525 Q38 440 38 310 L38 32 Q38 20 50 20 Z"/>
    </clipPath>
  </defs>
  <!-- Shield white background -->
  <path d="M50 20 L192 20 Q218 60 250 60 Q282 60 308 20 L450 20 Q462 20 462 32 L462 310 Q462 440 250 525 Q38 440 38 310 L38 32 Q38 20 50 20 Z" fill="white"/>
  <!-- 5 vertical stripes in lower half, clipped to shield -->
