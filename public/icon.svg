    <rect x="38"  y="165" width="98"  height="400" fill="#1a1a1a"/>
    <rect x="136" y="165" width="68"  height="400" fill="white"/>
    <rect x="204" y="165" width="92"  height="400" fill="#cc2222"/>
    <rect x="296" y="165" width="68"  height="400" fill="white"/>
    <rect x="364" y="165" width="98"  height="400" fill="#1a1a1a"/>
  </g>
  <!-- Shield thick outline -->
  <path d="M50 20 L192 20 Q218 60 250 60 Q282 60 308 20 L450 20 Q462 20 462 32 L462 310 Q462 440 250 525 Q38 440 38 310 L38 32 Q38 20 50 20 Z" fill="none" stroke="#1a1a1a" stroke-width="16" stroke-linejoin="round"/>
  <!-- B.F.C. text -->
  <text x="250" y="118" text-anchor="middle" dominant-baseline="middle" font-family="'Arial Black','Impact',sans-serif" font-weight="900" font-size="86" letter-spacing="3" fill="#1a1a1a">B.F.C.</text>
</svg>
